<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Primelane Digital — Client Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black: #080808;
      --white: #f8f5f0;
      --yellow: #FFD600;
      --gray: #141414;
      --gray2: #1c1c1c;
      --gray3: #252525;
      --muted: #666260;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    html { scroll-behavior:smooth; }
    body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; font-weight:300; overflow-x:hidden; min-height:100vh; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--black); position:relative; overflow:hidden;
    }
    .login-bg {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at 20% 50%, rgba(255,214,0,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,214,0,0.04) 0%, transparent 50%);
    }
    .login-card {
      position:relative; z-index:2;
      width:90%; max-width:420px;
      background:var(--gray2);
      border:1px solid rgba(255,214,0,0.15);
      padding:2.5rem;
    }
    .login-logo { text-align:center; margin-bottom:2rem; }
    .login-logo-badge {
      display:inline-block;
      background:var(--yellow); color:var(--black);
      font-family:'Bebas Neue',sans-serif;
      font-size:0.9rem; letter-spacing:0.15em;
      padding:0.3rem 1rem; margin-bottom:1rem;
    }
    .login-logo h1 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.08em; color:var(--white); }
    .login-logo p { font-size:0.75rem; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:0.3rem; }
    .login-divider { height:1px; background:rgba(255,214,0,0.15); margin:1.5rem 0; }
    .login-label { font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; display:block; }
    .login-input {
      width:100%; padding:0.85rem 1rem;
      background:var(--gray3); border:1px solid rgba(255,255,255,0.08);
      color:var(--white); font-family:'DM Sans',sans-serif; font-size:0.9rem;
      outline:none; margin-bottom:1rem; transition:border-color 0.2s;
    }
    .login-input:focus { border-color:var(--yellow); }
    .login-input::placeholder { color:var(--muted); }
    .login-btn {
      width:100%; background:var(--yellow); color:var(--black);
      padding:0.9rem; font-family:'DM Sans',sans-serif;
      font-size:0.85rem; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; border:none; cursor:pointer;
      transition:all 0.2s; margin-top:0.5rem;
    }
    .login-btn:hover { background:var(--white); }
    .login-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; padding:0.7rem 1rem; font-size:0.82rem; margin-bottom:1rem; display:none; }
    .login-footer { text-align:center; margin-top:1.5rem; font-size:0.72rem; color:var(--muted); }

    /* ── PORTAL ── */
    .portal { display:none; min-height:100vh; }

    /* Sidebar */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0; width:240px;
      background:var(--gray2); border-right:1px solid rgba(255,214,0,0.1);
      display:flex; flex-direction:column; z-index:100;
    }
